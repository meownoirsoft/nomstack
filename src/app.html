<!doctype html>
<html lang="en" data-theme="nomstack">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/logo/nomstack-logo-grape.webp" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- PWA Meta Tags -->
		<meta name="theme-color" content="#8b5cf6" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="nomStack" />
		<meta name="msapplication-TileColor" content="#8b5cf6" />
		<meta name="msapplication-tap-highlight" content="no" />
		
		<!-- Apple Touch Icons -->
		<link rel="apple-touch-icon" href="%sveltekit.assets%/logo/nomstack-logo-grape.webp" />
		
		<!-- Prefetch -->
		<link rel="prefetch" as="image" href="%sveltekit.assets%/no-drama-dinner-decider300.png" />
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents; background-color: var(--app-background, #ffffff);">%sveltekit.body%</div>
	</body>
</html>
