[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  # Runtime env vars (DATABASE_URL, RESEND_API_KEY, EMAIL_FROM, APP_URL,
  # OPENAI_API_KEY, STRIPE_*, PUBLIC_STRIPE_PRICE_ID, GOOGLE_PLACES_API_KEY)
  # are configured in the Netlify dashboard. Don't set them to "" here —
  # empty strings in netlify.toml override dashboard values.

[secrets]
  SECRETS_SCAN_ENABLED = false
  SECRETS_SCAN_OMIT_KEYS = "DATABASE_URL,RESEND_API_KEY,EMAIL_FROM,OPENAI_API_KEY,GOOGLE_PLACES_API_KEY,GOOGLE_AI_API_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,PUBLIC_STRIPE_PUBLISHABLE_KEY,PUBLIC_STRIPE_PRICE_ID"
  SECRETS_SCAN_OMIT_PATHS = "build/**,.netlify/**"
