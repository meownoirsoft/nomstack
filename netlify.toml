[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  # Stripe environment variables (add your actual values in Netlify dashboard)
  STRIPE_SECRET_KEY = ""
  STRIPE_WEBHOOK_SECRET = ""
  PUBLIC_STRIPE_PUBLISHABLE_KEY = ""
  PUBLIC_STRIPE_PRICE_ID = ""

# Disable secrets scanning for environment variable names
[secrets]
  SECRETS_SCAN_ENABLED = false
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_SERVICE_ROLE_KEY,GOOGLE_PLACES_API_KEY,VITE_SUPABASE_ANON_KEY,SUPABASE_URL,OPENAI_API_KEY,GOOGLE_AI_API_KEY,VITE_GOOGLE_PLACES_API_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,PUBLIC_STRIPE_PUBLISHABLE_KEY,PUBLIC_STRIPE_PRICE_ID"
  SECRETS_SCAN_OMIT_PATHS = "build/**,.netlify/**"
