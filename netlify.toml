[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"

# Disable secrets scanning for environment variable names
[secrets]
  SECRETS_SCAN_ENABLED = false
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_SERVICE_ROLE_KEY,GOOGLE_PLACES_API_KEY,VITE_SUPABASE_ANON_KEY,SUPABASE_URL,OPENAI_API_KEY,GOOGLE_AI_API_KEY,VITE_GOOGLE_PLACES_API_KEY"
  SECRETS_SCAN_OMIT_PATHS = "build/**,.netlify/**"
