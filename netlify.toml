[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  # LemonSqueezy environment variables (add your actual values in Netlify dashboard)
  LEMONSQUEEZY_API_KEY = ""
  LEMONSQUEEZY_WEBHOOK_SECRET = ""
  LEMONSQUEEZY_STORE_ID = ""
  PUBLIC_LEMONSQUEEZY_VARIANT_ID = ""

# Disable secrets scanning for environment variable names
[secrets]
  SECRETS_SCAN_ENABLED = false
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_SERVICE_ROLE_KEY,GOOGLE_PLACES_API_KEY,VITE_SUPABASE_ANON_KEY,SUPABASE_URL,OPENAI_API_KEY,GOOGLE_AI_API_KEY,VITE_GOOGLE_PLACES_API_KEY,LEMONSQUEEZY_API_KEY,LEMONSQUEEZY_WEBHOOK_SECRET,LEMONSQUEEZY_STORE_ID,PUBLIC_LEMONSQUEEZY_VARIANT_ID"
  SECRETS_SCAN_OMIT_PATHS = "build/**,.netlify/**"
